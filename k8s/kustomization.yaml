apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace
namespace: tienda-api

# Recursos en orden de aplicación
resources:
- 01-namespace.yaml
- 02-mariadb-secret.yaml
- 03-mariadb-configmap.yaml
- 04-mariadb-pvc.yaml
- 05-mariadb-statefulset.yaml
- 06-mariadb-service.yaml
- 07-api-configmap.yaml
- 08-api-deployment.yaml
- 09-api-service.yaml

# Configuración de replicas (opcional)
replicas:
- name: api-tienda
  count: 2

# Etiquetas comunes a todos los recursos
commonLabels:
  app: tienda-api
  managed-by: kustomize

# Anotaciones comunes
commonAnnotations:
  description: "API REST de Tienda de Teléfonos - Deployment Kubernetes"
  version: "1.0.0"
