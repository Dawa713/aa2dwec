apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: tienda-api
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: mysql
          containerPort: 3306
        
        env:
        # Credenciales desde Secret
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: root-password
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: user
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: password
        # Configuración desde ConfigMap
        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mariadb-config
              key: MARIADB_DATABASE
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
        
        # Health check para readiness
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mysqladmin ping -u root -p${MARIADB_ROOT_PASSWORD} || exit 1
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        
        # Health check para liveness
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mysqladmin ping -u root -p${MARIADB_ROOT_PASSWORD} || exit 1
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      
      volumes:
      - name: mariadb-storage
        persistentVolumeClaim:
          claimName: mariadb-pvc
