apiVersion: v1
kind: Service
metadata:
  name: api-tienda
  namespace: tienda-api
  labels:
    app: api-tienda
spec:
  type: LoadBalancer  # En local usa minikube tunnel
  selector:
    app: api-tienda
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 5001
    protocol: TCP
